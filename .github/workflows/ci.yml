name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Run JavaScript actions (checkout/setup-node/setup-python/upload-artifact) on
# Node.js 24 ahead of GitHub's June 2026 default switch. Silences the
# "Node.js 20 actions are deprecated" warning.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-tests:
    name: Backend pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend + dev deps
        run: pip install -r requirements-dev.lock

      - name: Run ruff
        run: ruff check

      - name: Run pytest
        run: pytest -v --cov=backend --cov-report=term-missing --cov-fail-under=70

  frontend-lint-build:
    name: Frontend lint + build (typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Build (includes tsc -b typecheck)
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend deps
        run: pip install -r requirements.lock

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: pw-${{ runner.os }}-

      - name: Install Playwright system deps
        working-directory: frontend
        timeout-minutes: 5
        run: npx playwright install-deps chromium

      - name: Install Playwright Chromium binary
        working-directory: frontend
        timeout-minutes: 8
        env:
          DEBUG: pw:install
        run: |
          set -e
          for i in 1 2 3; do
            if timeout 360 npx playwright install chromium; then
              echo "Playwright chromium install succeeded on attempt $i"
              break
            fi
            if [ $i -eq 3 ]; then
              echo "Playwright chromium install failed after 3 attempts (timeout 360s each)"
              exit 1
            fi
            echo "Attempt $i timed out or failed (CDN throttle), sleeping 30s before retry..."
            sleep 30
          done

      - name: Stage fixture DB and patch case 126 abs_path
        run: ./tests/fixtures/setup.sh

      - name: Run E2E
        working-directory: frontend
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results
          retention-days: 7
